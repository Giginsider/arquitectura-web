<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pago | SportyStyle</title>
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
  <header>
    <h1>SPORTY<span class="acento">STYLE</span></h1>
    <p class="sponsor">Sponsor Oficial · Mercedes-AMG Petronas F1 Team</p>
  </header>

  <main class="pago-wrapper">
    <section class="pago-card">
      <h2>Datos de envío y pago</h2>
      <p class="pago-sub">Completa tus datos para terminar el pit stop 🏁</p>

      <form id="form-pago" novalidate>
        <div class="campo">
          <label for="nombre">Nombre completo</label>
          <input type="text" id="nombre" placeholder="Ej: nombre" required>
        </div>

        <div class="campo">
          <label for="direccion">Dirección de envío</label>
          <input type="text" id="direccion" placeholder="Calle, número, comuna" required>
        </div>

        <div class="grid-2">
          <div class="campo">
            <label for="correo">Correo electrónico</label>
            <input type="email" id="correo" placeholder="@sportystyle.test" required>
          </div>
          <div class="campo">
            <label for="telefono">Teléfono</label>
            <input type="text" id="telefono" placeholder="9 dígitos" required>
          </div>
        </div>

        <p id="error" class="mensaje-error"></p>

        <div class="acciones">
          <a href="index.html" class="btn-secundario">← Volver a la tienda</a>
          <button type="submit" class="btn-primario">Confirmar compra</button>
        </div>
      </form>
    </section>
  </main>

  <script src="js/pago.js"></script>
</body>
</html>
