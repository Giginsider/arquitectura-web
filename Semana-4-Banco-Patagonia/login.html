<!DOCTYPE html>
<html lang="es">
<head>

    <title>Login - Banco Patagonia</title>

</head>
<body>

    <div class="login-container">

        <img src="Public/1115389.png" style="width: 50px; height: 50px;"/>

</form>

<p id="mensaje"></p>
</div>
<script src="script.js"></script>


</body>
</html>
